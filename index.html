<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Replacement Form – Maharashtra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="form-wrapper">
    <div class="form-header">
      <div class="header-logo">🏛️</div>
      <h1>Staff Replacement Form</h1>
      <p class="subtitle">Maharashtra Division – HR Entry Portal</p>
    </div>

    <form id="replacementForm">

      <!-- ROW 1: Date -->
      <div class="form-section">
        <h2 class="section-title">📅 Basic Information</h2>
        <div class="form-grid">

          <div class="form-group">
            <label for="date">Date <span class="required">*</span></label>
            <input type="date" id="date" name="date" required />
          </div>

          <!-- ROW 2: Division -->
          <div class="form-group">
            <label for="division">Division <span class="required">*</span></label>
            <select id="division" name="division" required>
              <option value="">-- Select Division --</option>
              <option value="Akola">Akola</option>
              <option value="CHHATRAPATI SAMBHAJINAGAR">Chhatrapati Sambhajinagar</option>
              <option value="Kolhapur">Kolhapur</option>
              <option value="Latur">Latur</option>
              <option value="Nagpur">Nagpur</option>
              <option value="Nashik">Nashik</option>
              <option value="Pune">Pune</option>
              <option value="Thane">Thane</option>
            </select>
          </div>

          <!-- ROW 3: District (Dependent) -->
          <div class="form-group">
            <label for="district">District <span class="required">*</span></label>
            <select id="district" name="district" required>
              <option value="">-- Select Division First --</option>
            </select>
          </div>

        </div>
      </div>

      <!-- ROW 4: Person Details -->
      <div class="form-section">
        <h2 class="section-title">👤 Person Being Replaced</h2>
        <div class="form-grid">

          <div class="form-group full-width">
            <label for="replacementAgainst">Replacement Against (Name of Person) <span class="required">*</span></label>
            <input type="text" id="replacementAgainst" name="replacementAgainst"
              placeholder="Enter the name of person being replaced" required />
          </div>

          <div class="form-group">
            <label for="name">New Person Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="Enter full name" required />
          </div>

          <div class="form-group">
            <label for="designation">Designation <span class="required">*</span></label>
            <select id="designation" name="designation" required>
              <option value="">-- Select Designation --</option>
              <option value="Operation Executive">Operation Executive</option>
              <option value="Call Center Executive">Call Center Executive</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number"
              maxlength="10" pattern="[0-9]{10}" />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" />
          </div>

        </div>
      </div>

      <!-- ROW 5: Assessment -->
      <div class="form-section">
        <h2 class="section-title">📊 Assessment & Evaluation</h2>
        <div class="form-grid">

          <div class="form-group">
            <label for="communication">Communication Skills <span class="required">*</span></label>
            <select id="communication" name="communication" required>
              <option value="">-- Select Rating --</option>
              <option value="Excellent">⭐⭐⭐⭐⭐ Excellent</option>
              <option value="Good">⭐⭐⭐⭐ Good</option>
              <option value="Average">⭐⭐⭐ Average</option>
              <option value="Below Average">⭐⭐ Below Average</option>
              <option value="Poor">⭐ Poor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="technicalKnowledge">Technical Knowledge <span class="required">*</span></label>
            <select id="technicalKnowledge" name="technicalKnowledge" required>
              <option value="">-- Select Rating --</option>
              <option value="Excellent">⭐⭐⭐⭐⭐ Excellent</option>
              <option value="Good">⭐⭐⭐⭐ Good</option>
              <option value="Average">⭐⭐⭐ Average</option>
              <option value="Below Average">⭐⭐ Below Average</option>
              <option value="Poor">⭐ Poor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="joiningDate">Joining Date</label>
            <input type="date" id="joiningDate" name="joiningDate" />
          </div>

          <div class="form-group">
            <label for="experience">Prior Experience</label>
            <select id="experience" name="experience">
              <option value="">-- Select --</option>
              <option value="Fresher">Fresher (0 years)</option>
              <option value="0-1 Year">0–1 Year</option>
              <option value="1-3 Years">1–3 Years</option>
              <option value="3-5 Years">3–5 Years</option>
              <option value="5+ Years">5+ Years</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="remarks">Remarks / Additional Notes</label>
            <textarea id="remarks" name="remarks" rows="4"
              placeholder="Any additional observations, reasons for replacement, or notes..."></textarea>
          </div>

        </div>
      </div>

      <!-- Submit -->
      <div class="form-actions">
        <button type="reset" class="btn-reset" onclick="resetForm()">🔄 Clear Form</button>
        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">📤 Submit to Google Sheet</span>
          <span id="btnLoader" style="display:none;">⏳ Submitting...</span>
        </button>
      </div>

    </form>

    <!-- Success / Error message -->
    <div id="successMsg" class="msg success" style="display:none;">
      ✅ Form submitted successfully! Data saved to Google Sheet.
    </div>
    <div id="errorMsg" class="msg error" style="display:none;">
      ❌ Submission failed. Please check your connection and try again.
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
